    body: "Three guards. First: `if item is None: return 0.0`. Second: `.get(\"price\", \"\")` to avoid `KeyError`. Third: check the result is non-empty before `float()`."
  - level: 2
    body: "Start with `if item is None: return 0.0`. Then `raw = item.get(\"price\", \"\")`. Then `if raw == \"\": return 0.0`. Finally `return float(raw)`."
