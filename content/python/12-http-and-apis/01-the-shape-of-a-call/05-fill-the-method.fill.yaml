      - loads
    caseSensitive: true
hint:
  - level: 1
    body: "It's the JSON-string-to-dict function. Sibling of `json.dump`/`json.load`, but it takes a string."
  - level: 2
    body: "`json.loads(...)` — the trailing `s` is for *string*. `json.load` takes a file object; `json.loads` takes a string."
