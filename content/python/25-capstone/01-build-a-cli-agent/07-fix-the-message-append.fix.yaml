    body: "On a tool round-trip, you append two messages: the assistant's tool_use AND the user's tool_result. The first one is missing."
  - level: 2
    body: "Before the existing append, add: `messages.append({\"role\": \"assistant\", \"content\": response[\"content\"]})`."
