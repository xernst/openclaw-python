xp: 4
estSeconds: 80
concept: break-vs-continue
prompt: |
  Cursor wrote a loop that should print every number from `1` to `6`,
  *skipping* `4`. Instead, the loop stops dead at `4` and never prints `5`
  or `6`. The wrong keyword is on line 3.

  Fix it so the output is `1`, `2`, `3`, `5`, `6` — each on its own line.
brokenCode: |
  for n in range(1, 7):
      if n == 4:
          break
      print(n)
bugLines:
  - 3
grader:
  kind: stdout-equality
  expected: |
    1
    2
    3
    5
    6
  normalize: collapse-trailing-newline
hint:
  - level: 1
    body: "`break` ends the whole loop. The prompt asks for a *skip*, not a stop. There's a different keyword for that."
  - level: 2
    body: "Change `break` to `continue` on line 3. `continue` skips the rest of this pass and goes to the next iteration."
revealAfter: 4
