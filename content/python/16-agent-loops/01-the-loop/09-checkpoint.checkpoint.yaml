prompt: |
  Final drill. Build a slightly bigger agent loop. Write
  `run_agent(question, max_iterations)` that:

  - Maintains a `messages` list, starting with one user turn.
  - Calls `fake_model(messages)` up to `max_iterations` times.
  - On `stop_reason == "end_turn"`: return the dict
    `{"ok": True, "answer": <text>, "rounds": <iterations used>}`.
  - On `stop_reason == "tool_use"`: run the tool by calling
    `fake_tool(name, input)`, append the assistant turn + a user turn
    with a `tool_result` carrying the tool's output, increment count,
    and continue.
  - If `max_iterations` is exhausted: return
    `{"ok": False, "answer": "capped", "rounds": max_iterations}`.

  Then the script will run two cases and print each result.

  Expected output:
  ```
  ok=True rounds=2 answer=area is 50
  ok=False rounds=2 answer=capped
  ```
