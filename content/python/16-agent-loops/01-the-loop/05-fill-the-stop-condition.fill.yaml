      return {"stop_reason": "end_turn", "content": [{"type": "text", "text": "done"}]}

  messages = [{"role": "user", "content": "hi"}]
  while True:
      response = fake_model(messages)
      if response["stop_reason"] == "___":
          print(response["content"][0]["text"])
          break
      # ... handle tool_use ...
