estSeconds: 80
concept: agent-loop-iteration-count
code: |
  # mock a tiny agent loop. fake_model returns tool_use twice, then end_turn.
  call_count = {"n": 0}

  def fake_model(messages):
      call_count["n"] += 1
      if call_count["n"] < 3:
          return {"stop_reason": "tool_use"}
      return {"stop_reason": "end_turn"}

  messages = [{"role": "user", "content": "do the thing"}]
  iterations = 0
  while True:
      response = fake_model(messages)
      iterations += 1
      if response["stop_reason"] == "end_turn":
          break
      messages.append({"role": "assistant", "content": []})
      messages.append({"role": "user", "content": [{"type": "tool_result"}]})

  print(f"iterations: {iterations}")
prompt: |
  Read the editor. The fake model returns `tool_use` on calls 1 and 2,
  then `end_turn` on call 3. How many times does the loop iterate
  before exiting?
grader:
  kind: stdout-equality
  expected: "iterations: 3"
  normalize: collapse-trailing-newline
hint:
  - level: 1
    body: 'The loop calls the model, increments `iterations`, then checks `stop_reason`. It exits on `end_turn`, which is the third call.'
  - level: 2
    body: 'Three iterations: tool_use, tool_use, end_turn.'
