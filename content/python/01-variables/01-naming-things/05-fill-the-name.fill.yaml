xp: 2
estSeconds: 50
concept: f-string-interpolation
prompt: |
  Look at the editor on the right. Cursor wrote a greeting snippet — the
  variable was defined on line 1, but the f-string on line 2 has a blank
  where the variable name should go.

  Variable name: ___
code: |
  user_name = "Maya"
  print(f"hi, {___}")
blanks:
  - id: name
    accept:
      - user_name
    caseSensitive: true
hint:
  - level: 1
    body: "f-strings substitute whatever variable name you put inside the curly braces."
  - level: 2
    body: "The variable is defined on line 1. Use the same exact name inside `{ }`."
