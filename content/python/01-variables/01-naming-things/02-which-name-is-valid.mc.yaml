concept: variable-naming-rules
code: |
  # valid Python variable names: letters, digits, underscores;
  # cannot start with a digit; case-sensitive.
  score = 7
  user_score = 8
  print(score, user_score)
prompt: |
  Cursor just wrote you four lines and only one of them is a valid Python variable name.
  Which one will Python accept?
options:
  - id: a
    label: "`2nd_score`"
    explain: "Variable names can't start with a digit."
  - id: b
    label: "`user-score`"
    explain: "Hyphens are subtraction in Python — that line is `user` minus `score`, not a name."
  - id: c
    label: "`user_score`"
  - id: d
    label: "`user score`"
    explain: "Spaces split a name in two. Python sees `user` and `score` separately."
answerIds:
  - c
