concept: prompt-scoring
code: |
  # a toy prompt-scorer: 1 point per part present in the prompt.
  parts = ["context", "goal", "constraint", "format"]

  def score(prompt):
      return sum(1 for p in parts if p in prompt)

  prompt = {
      "context": "fastapi route file",
      "goal":    "add a delete handler",
      "format":  "diff only",
  }

  print(f"score: {score(prompt)} / 4")
