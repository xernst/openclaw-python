    body: 'Three steps inside `ask`: build the messages list, call `fake_create(messages)`, return `response["content"][0]["text"]`.'
  - level: 2
    body: '`messages = [{"role": "user", "content": question}]` then `return fake_create(messages)["content"][0]["text"]`.'
