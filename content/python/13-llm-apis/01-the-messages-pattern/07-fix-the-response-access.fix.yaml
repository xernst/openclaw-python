concept: llm-response-text-path
prompt: |
  AI assumed the response had a top-level `text` field, but Anthropic
  returns text nested inside `content[0]`. The script crashes with a
  `KeyError`. Fix line 11 so it prints the reply.

  Expected output:
  ```
  All tests pass.
  ```
brokenCode: |
  response = {
      "id": "msg_99",
      "role": "assistant",
      "model": "claude-sonnet-4-6",
      "content": [
          {"type": "text", "text": "All tests pass."}
      ],
      "stop_reason": "end_turn",
  }

  print(response["text"])
bugLines:
  - 11
grader:
  kind: stdout-equality
  expected: "All tests pass."
  normalize: collapse-trailing-newline
hint:
