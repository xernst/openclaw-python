prompt: |
  Final drill. Build a multi-turn chat helper. Write `chat(history, new_message)`
  that:

  - Appends a new user turn `{"role": "user", "content": new_message}` to
    `history`.
  - Calls `fake_create(history)` to simulate the model.
  - Appends the assistant reply to `history` as
    `{"role": "assistant", "content": <reply text>}`.
  - Returns the updated `history`.

  Then the script will run two turns and print every turn's role and
  content. Expected output:

  ```
  user: hi
  assistant: hello
  user: who are you?
  assistant: an assistant.
  ```
