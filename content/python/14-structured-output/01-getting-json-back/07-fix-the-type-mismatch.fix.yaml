brokenCode: |
  data = {"email": "maya@pyloft.dev", "severity": "5", "summary": "slow"}

  # the model lied about the type — coerce before validating
  severity = data["severity"]

  assert isinstance(severity, int), "severity must be int"
  print(f"severity: {severity}")
