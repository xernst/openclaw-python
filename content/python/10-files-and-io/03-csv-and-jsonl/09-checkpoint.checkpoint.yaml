solution: |
  import csv
  import json
  from pathlib import Path

  Path("/tmp/scores.csv").write_text(
      "name,score\n"
      "alex,82\n"
      "sam,91\n"
      "jordan,77\n"
  )

  def csv_to_jsonl(csv_path, jsonl_path):
      count = 0
      with open(csv_path, newline="") as src, open(jsonl_path, "w") as dst:
          for row in csv.DictReader(src):
              row["score"] = int(row["score"])
              dst.write(json.dumps(row) + "\n")
              count += 1
      return count

  count = csv_to_jsonl(Path("/tmp/scores.csv"), Path("/tmp/scores.jsonl"))
  print(count)

  for line in Path("/tmp/scores.jsonl").read_text().splitlines():
      r = json.loads(line)
      print(r["name"], r["score"])
